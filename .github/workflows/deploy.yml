name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Login Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Backend
      run: docker build -t 1401262005/backend ./server

    - name: Push Backend
      run: docker push 1401262005/backend

    - name: Build Frontend
      run: docker build -t 1401262005/frontend ./client

    - name: Push Frontend
      run: docker push 1401262005/frontend

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker pull 1401262005/backend
          docker pull 1401262005/frontend

          docker stop backend || true
          docker rm backend || true
          docker stop frontend || true
          docker rm frontend || true

          docker run -d -p 5000:5000 --name backend 1401262005/backend
          docker run -d -p 80:80 --name frontend 1401262005/frontend